name: Deploy to Tencent Cloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 82.156.238.108 >> ~/.ssh/known_hosts

      - name: Upload project
        run: |
          tar --exclude='.git' -czf /tmp/victorforge-app.tar.gz .
          scp /tmp/victorforge-app.tar.gz ubuntu@82.156.238.108:/tmp/victorforge-app.tar.gz

      - name: Build and deploy
        run: |
          ssh ubuntu@82.156.238.108 <<'EOF'
            set -e
            mkdir -p ~/apps/victorforge-deploy-demo
            tar -xzf /tmp/victorforge-app.tar.gz -C ~/apps/victorforge-deploy-demo
            cd ~/apps/victorforge-deploy-demo
            sudo docker compose build
            sudo docker rm -f hello-web 2>/dev/null || true
            sudo docker compose up -d
            sudo docker image prune -f
          EOF
